plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "com.facebook.react"
    id "com.google.gms.google-services"
}

react {
    // Ostavi podrazumijevano; autolink radi ovdje
    autolinkLibrariesWithApp()
}

def enableSeparateBuildPerCPUArchitecture = true
def enableProguardInReleaseBuilds = false

// Ako želiš JSC umjesto Hermesa, ostavi false
def enableHermes = false

def jscFlavor = 'org.webkit:android-jsc:+'

def reactNativeArchitectures() {
    def value = project.getProperties().get("reactNativeArchitectures")
    return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

android {
    namespace 'eu.greenguardapp'

    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    // (lintOptions je deprecated u AGP 8; ali ako želiš ostaje ovako, ili prebaci u `lint { }`)
    lintOptions {
        disable 'MissingPermission'
    }

    defaultConfig {
        applicationId "eu.greenguardapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 64
        versionName "1.2.5"

        vectorDrawables.useSupportLibrary = true

        // stara RN camera dimenzija – može ostati
        missingDimensionStrategy 'react-native-camera', 'general', 'store', 'play'
    }

    splits {
        abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture
            // generiše i univerzalni APK (lakše za test)
            universalApk true
            include (*reactNativeArchitectures())
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // U produkciji stavi svoj keystore
    storeFile file(MYAPP_UPLOAD_STORE_FILE)
    storePassword MYAPP_UPLOAD_STORE_PASSWORD
    keyAlias MYAPP_UPLOAD_KEY_ALIAS
    keyPassword MYAPP_UPLOAD_KEY_PASSWORD
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // Stari OutputFile API više i nije potreban – izbacili smo ga.
    // Ako želiš posebne versionCode per ABI, može preko novog Variant API, ali nije nužno.

    // pickFirst za JSC/c++ so – OK
    packagingOptions {
        pickFirst '**/armeabi-v7a/libc++_shared.so'
        pickFirst '**/x86/libc++_shared.so'
        pickFirst '**/arm64-v8a/libc++_shared.so'
        pickFirst '**/x86_64/libc++_shared.so'
        pickFirst '**/x86/libjsc.so'
        pickFirst '**/armeabi-v7a/libjsc.so'
    }

    flavorDimensions "appstore"
    productFlavors {
        googlePlay {
            dimension "appstore"
            missingDimensionStrategy "store", "play"
        }
        amazon {
            dimension "appstore"
            missingDimensionStrategy "store", "amazon"
        }
    }

    // ❌ UKLONJENO: miješanje support-compat 27 i AndroidX + čudna exclude 'classes'
    // configurations.all { resolutionStrategy { ... } }
    // configurations { all*.exclude group:'androidx.core', module:'classes' }
}

dependencies {
    implementation 'com.google.android.gms:play-services-auth:21.2.0'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.facebook.android:facebook-android-sdk:latest.release'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.2.0-alpha01'
    implementation 'androidx.localbroadcastmanager:localbroadcastmanager:1.0.0'

    implementation "com.braintreepayments.api:data-collector:3.+"

    // React Native core – prepušta verziju RN pluginu
    implementation("com.facebook.react:react-android")

    // ✅ Korigovano: koristi tačnu varijablu enableHermes
    if (enableHermes) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// ❌ Duplikati "apply plugin" i dodatni vector-icons apply su uklonjeni.
//   (react-native-vector-icons odavno autolinka; fonts.gradle nije potreban u većini setupa)
