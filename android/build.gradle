// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        googlePlayServicesAuthVersion = "21.2.0" // Updated to latest compatible version
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24" // Updated to latest compatible version
        supportLibVersion = "28.0.0" // Consider migrating to AndroidX if not done
        androidXAnnotation = "1.9.0" // Updated to latest compatible version
        androidXBrowser = "1.9.0" // Updated to latest compatible version
        facebookSdkVersion = "17.0.0" // Updated to latest compatible version
    
    }
    repositories {
        google()
        mavenCentral()
    }
dependencies {
    classpath("com.android.tools.build:gradle:8.1.1")            // AGP s verzijom
     classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    classpath("com.google.gms:google-services:4.4.2")
    // NOTE: app deps idu u module build.gradle (ne ovdje)
}

}
allprojects {

     repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        maven {
            // expo-camera bundles a custom com.google.android:cameraview
            url "$rootDir/../node_modules/expo-camera/android/maven"
        }
        mavenCentral {
            // We don't want to fetch react-native from Maven Central as there are
            // older versions over there.
            content {
                excludeGroup "com.facebook.react"
            }
        }
        maven { url 'https://maven.google.com' }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
        // jcenter() {
        //     content {
        //        includeModule("com.danikula", "videocache")
        //     }
        // }
    }
    afterEvaluate {
        if (getPlugins().hasPlugin('android') ||
            getPlugins().hasPlugin('android-library')) {
            configure(android.lintOptions) {
                abortOnError false
                checkReleaseBuilds false
            }
        }
    }
}




